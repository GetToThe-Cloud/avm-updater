trigger: none # Manual or schedule only

schedules:
- cron: '0 8 * * 1' # Weekly on Mondays at 08:00 UTC
  displayName: 'Weekly AVM version check'
  branches:
    include:
    - main
  always: true

parameters:
- name: targetRepository
  displayName: 'Target repository URL to scan (leave empty to scan this repository)'
  type: string
  default: ''
- name: includeRisk
  displayName: 'Risk tiers to include'
  type: string
  default: 'LOW,MEDIUM,HIGH,UNKNOWN'
- name: dryRun
  displayName: 'Dry run (no file changes, no PRs)'
  type: boolean
  default: false

pool:
  vmImage: ubuntu-latest

variables:
  BICEP_VERSION: 'latest'

steps:
- checkout: self
  fetchDepth: 0
  persistCredentials: true

# Clone a different repo when targetRepository is specified.
# Uses System.AccessToken for same-organisation repos; set a pipeline variable
# TARGET_REPO_TOKEN (secret) for cross-organisation access.
- bash: |
    TOKEN="${TARGET_REPO_TOKEN:-$(System.AccessToken)}"
    git -c "http.extraHeader=Authorization: Bearer $TOKEN" \
        clone --depth 0 '${{ parameters.targetRepository }}' ./target-repo
  displayName: 'Checkout target repository'
  condition: ne('${{ parameters.targetRepository }}', '')
  env:
    TARGET_REPO_TOKEN: $(TARGET_REPO_TOKEN)

- task: UseCustomVersion@1
  displayName: 'Skip — PowerShell 7 pre-installed on ubuntu-latest'
  condition: false

- bash: |
    pwsh --version || (
      sudo apt-get update -qq &&
      sudo apt-get install -y powershell
    )
  displayName: 'Ensure PowerShell 7'

- bash: |
    curl -Lo bicep https://github.com/Azure/bicep/releases/latest/download/bicep-linux-x64
    chmod +x bicep
    sudo mv bicep /usr/local/bin/bicep
    bicep --version
  displayName: 'Install Bicep CLI'

- task: TerraformInstaller@1
  displayName: 'Install Terraform'
  inputs:
    terraformVersion: 'latest'

- bash: |
    az version
    az extension add --name azure-devops --yes 2>/dev/null || true
  displayName: 'Install azure-devops extension'

- bash: |
    git config --global user.email "avm-updater[bot]@users.noreply.visualstudio.com"
    git config --global user.name  "avm-updater[bot]"
  displayName: 'Configure git identity'

- pwsh: |
    Set-StrictMode -Version Latest
    $ErrorActionPreference = 'Stop'
    Import-Module ./AvmUpdater/AvmUpdater.psd1 -Force

    # Convert comma-separated string to array
    $riskTiers = '${{ parameters.includeRisk }}' -split ',' | ForEach-Object { $_.Trim() }

    $scanPath = if ('${{ parameters.targetRepository }}') { './target-repo' } else { '.' }

    $params = @{
      Path            = $scanPath
      ApprovalMode    = 'azuredevops'
      IncludeRisk     = $riskTiers
      OutputDirectory = '$(Build.ArtifactStagingDirectory)/avm-report'
    }
    if ($true -eq [bool]'${{ parameters.dryRun }}') {
      $params['DryRun'] = $true
    }

    Invoke-AvmUpdate @params
  displayName: 'Run Invoke-AvmUpdate'
  env:
    SYSTEM_ACCESSTOKEN: $(System.AccessToken)

- task: PublishBuildArtifacts@1
  displayName: 'Publish AVM report'
  condition: always()
  inputs:
    PathtoPublish: '$(Build.ArtifactStagingDirectory)/avm-report'
    ArtifactName: 'avm-update-report'
    publishLocation: 'Container'
